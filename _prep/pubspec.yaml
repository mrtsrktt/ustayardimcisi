name: ustayardimcisi
description: MarangozAI - Marangoz ustaları için mutfak/dolap tasarım, kesim listesi ve maliyet uygulaması
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  riverpod: ^2.6.1
  flutter_riverpod: ^2.6.1

  # Database
  drift: ^2.24.0
  sqlite3_flutter_libs: ^0.5.30
  path_provider: ^2.1.5
  path: ^1.9.1

  # PDF generation
  pdf: ^3.11.1
  printing: ^5.14.2

  # Excel generation
  excel: ^4.0.6

  # File handling
  file_picker: ^8.1.7
  share_plus: ^10.1.4
  url_launcher: ^6.3.1

  # Image
  image_picker: ^1.1.2
  image: ^4.5.2

  # QR
  qr_flutter: ^4.1.0

  # HTTP
  http: ^1.2.2
  dio: ^5.7.0

  # JSON
  json_annotation: ^4.9.0

  # File paths
  file_selector: ^1.0.3

  # Encryption (KVKK compliance)
  encrypt: ^5.0.3

  # UUID
  uuid: ^4.5.1

  # Date formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.24.0
  build_runner: ^2.4.14
  json_serializable: ^6.9.2
  test: ^1.25.14

flutter:
  uses-material-design: true

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

  assets:
    - assets/images/
    - assets/icons/
